name: Deploy to Beget

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies 🔧
        run: npm ci

      # Vite вшивает VITE_* из process.env на момент сборки. Secrets/Variables нужно явно пробросить в env шага.
      # Значения: Actions → Secrets (рекомендуется для ключа) или Variables — тогда подставится через vars.*
      - name: Build 🏗️
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || vars.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: FTP Deploy 🚀
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Локальная папка со сборкой
          local-dir: ./dist/
          # Куда лить на сервере. Ставим ./ потому что аккаунт уже привязан к папке сайта
          server-dir: ./
          # Важно: НЕ удаляем старые файлы при деплое.
          # Иначе пользователи со старым index.html будут получать 404 на page-*.js чанки
          # после деплоя (особенно при lazy import).
          dangerous-clean-slate: false